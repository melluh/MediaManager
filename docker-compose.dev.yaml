services:
  db:
    image: postgres:17
    restart: unless-stopped
    container_name: postgres
    volumes:
      - ./res/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: MediaManager
      POSTGRES_DB: MediaManager
      POSTGRES_PASSWORD: MediaManager
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  metadata_relay:
    build:
      context: ./metadata_relay
      dockerfile: Dockerfile
      args:
        - VERSION=locally-built
    container_name: metadata-relay
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - TVDB_API_KEY=${TVDB_API_KEY:-}
  mediamanager:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        - VERSION=locally-built
        - BASE_PATH=
    container_name: mediamanager
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CONFIG_DIR=/app/config
      - MEDIAMANAGER_MISC__DEVELOPMENT=TRUE
      - MEDIAMANAGER_MISC__CORS_URLS=["http://localhost:5173"]
      - DISABLE_FRONTEND_MOUNT=TRUE
      - LOG_FILE=/dev/null
      - MEDIAMANAGER_LOG_LEVEL=DEBUG
      - MEDIAMANAGER_METADATA__TMDB__TMDB_RELAY_URL=http://metadata_relay:8000/tmdb
      - MEDIAMANAGER_METADATA__TVDB__TVDB_RELAY_URL=http://metadata_relay:8000/tvdb
    volumes:
      #- ./web/build:/app/web/build # this is only needed to test built frontend when developing frontend
      - ./res/images/:/data/images/
      - ./res/:/data/
      - ./res/config/:/app/config/
      - ./media_manager:/app/media_manager
    depends_on:
      db:
        condition: service_healthy
      metadata_relay:
        condition: service_started
  frontend:
    image: node:24-alpine
    container_name: mediamanager-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
      - "24678:24678"
    volumes:
      - ./web:/app
    depends_on:
      - mediamanager
  docs:
    image: squidfunk/mkdocs-material:9
    container_name: mediamanager-docs
    volumes:
      - .:/docs
    ports:
      - "9000:9000"
    command: serve -w /docs -a 0.0.0.0:9000


# ----------------------------
# Additional services can be uncommented and configured as needed
# ----------------------------

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./res/prowlarr:/config
    restart: unless-stopped
    ports:
      - "9696:9696"
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    volumes:
      - ./res/torrents:/download
      - ./res/qbittorrent:/config
